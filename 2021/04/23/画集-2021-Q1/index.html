            <h2>画集：2021-Q1</h2>

  <p>2021 Jan.</p>
<p>期末回家前画了很多画，差不多一两天一张的频率。主要用的写实的画法，先照素描画明暗，再在黑白基础上加颜色。</p>
<p><img src="https://i.loli.net/2021/04/26/RdwNxVqvztY4FZI.jpg" alt="1-1"></p>
<p><img src="https://i.loli.net/2021/04/26/MxulRqOEvp4dizB.jpg" alt="1-2"></p>
<p><img src="https://i.loli.net/2021/04/26/DfTdayNUAVKmJ31.jpg" alt="1-3"></p>
<p><img src="https://i.loli.net/2021/04/26/26GXWjVTmwOKMZp.jpg" alt="1-4"></p>
<p><img src="https://i.loli.net/2021/04/26/Mec7Bg3WqA8NhYD.jpg" alt="1-5"></p>
<p><img src="https://i.loli.net/2021/04/26/ucXYMHgS1IT69i5.jpg" alt="1-6"></p>
<p><img src="https://i.loli.net/2021/04/26/61DywgsWCm3rKvV.jpg" alt="1-7"></p>
<hr>
<p>2021 Feb.</p>
<p>寒假在家画得反而少了。银杏那张里的镜头光晕，是PS的滤镜，很好用。</p>
<p><img src="https://i.loli.net/2021/04/26/7x1EbaNMvUJzhBQ.jpg" alt="2-1"></p>
<p><img src="https://i.loli.net/2021/04/26/6JEgY8H4Z7d13uh.jpg" alt="2-2"></p>
<hr>
<p>2021 Mar.</p>
<p>尝试水彩。最后那张野餐画了大概有十天，用clean edge的笔刷一点点勾勒，但出来的效果也是最满意的。</p>
<p><img src="https://i.loli.net/2021/04/26/iDSec9wBIJMp7Ed.jpg" alt="3-1"></p>
